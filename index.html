    <head>
        <link rel="stylesheet" href="index.css">

    <body>
        <div class="container">
            <div class="scoreboard-container">
                <div class="team-section">
                    <h3>HOME</h3>
                    <div class="scoreboard">
                        <h1 id="homescore">0</h1>
                    </div>
                    <div class="button-container">
                        <button class="addition" onclick="addone()"> +1 </button>
                        <button class="addition" onclick="addtwo()"> +2 </button>
                        <button class="addition" onclick="addthree()"> +3 </button>
                    </div>
                </div>
        
                <div class="team-section">
                    <h3>GUEST</h3>
                    <div class="scoreboard">
                        <h1 id="guestscore">0</h1>
                        </div>
                        <div class="button-container">
                        <button class="addition" onclick="gaddone()"> +1 </button>
                        <button class="addition" onclick="gaddtwo()"> +2 </button>
                        <button class="addition" onclick="gaddthree()"> +3 </button>
                    </div>
                </div>
            </div> <button class="newgame" onclick="newGame()">NEW GAME</button>
                <div id="footer">
                <p>Created by: <strong>tineetot</strong></p>
                <div class="github-link">
                <a href="https://github.com/tineetot" target="_blank">View on GitHub</a>
                </div>
            </div>
        </div>
